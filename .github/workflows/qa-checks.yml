name: "Code QA Checks"

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - synchronize
      - opened
      - ready_for_review
      - reopened
      - review_requested

jobs:
  code-qa:
    name: Run Code QA Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run QA Check Tools
        run: |
          pnpm lint
          pnpm typecheck
          pnpm format:check

      - name: Verify Static Build
        run: pnpm run generate
        env:
          NUXT_PUBLIC_SITE_URL: https://tech.weburz.com

  hadolint-checks:
    name: Run Hadolint on the Dockerfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v6

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ./Dockerfile
